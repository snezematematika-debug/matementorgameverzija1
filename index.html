<!DOCTYPE html>
<html lang="mk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Снежана Златковска" />
    <meta name="copyright" content="Снежана Златковска" />
    <meta name="description" content="Специјализирана платформа за Математика за VII одделение. Креирано од Снежана Златковска." />
    <title>Мате-Ментор</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- KaTeX CSS се вчитува преку Vite (index.tsx import) -->
    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
      /* Custom print styles */
      @media print {
        @page {
          margin: 1cm;
        }
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }
      .katex { font-size: 1.1em; }
      
      /* Flashcard Flip Animation */
      .perspective-1000 {
        perspective: 1000px;
      }
      .preserve-3d {
        transform-style: preserve-3d;
      }
      .backface-hidden {
        backface-visibility: hidden;
      }
      .rotate-y-180 {
        transform: rotateY(180deg);
      }
    </style>
</head>
  <body class="bg-slate-50 text-slate-900">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
