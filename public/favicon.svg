<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background is transparent -->
  <path d="M100 380 L200 180 L256 300 L312 180 L412 380" 
        fill="none" 
        stroke="url(#grad)" 
        stroke-width="48" 
        stroke-linecap="round" 
        stroke-linejoin="round" />
  <!-- Middle circle -->
  <circle cx="256" cy="300" r="28" fill="white" stroke="url(#grad)" stroke-width="16" />
  <!-- Top right circle -->
  <circle cx="400" cy="180" r="48" fill="white" stroke="url(#grad)" stroke-width="16" />
</svg>
